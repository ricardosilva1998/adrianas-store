<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Imagem do produto">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf2f8" />
      <stop offset="100%" stop-color="#fce7f3" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#f9a8d4" opacity="0.5" />
    </pattern>
  </defs>
  <rect width="800" height="800" fill="url(#bg)" />
  <rect width="800" height="800" fill="url(#dots)" />
  <g transform="translate(400 400)">
    <circle r="140" fill="#F691B4" opacity="0.25" />
    <circle r="90" fill="#ED7396" opacity="0.45" />
    <path
      d="M-40 -20 Q-40 -50 -10 -50 Q20 -50 20 -20 Q20 10 -10 10 Q-40 10 -40 -20 Z"
      fill="#ffffff"
      opacity="0.9"
    />
    <path
      d="M-15 30 Q0 40 15 30"
      stroke="#ffffff"
      stroke-width="4"
      stroke-linecap="round"
      fill="none"
      opacity="0.9"
    />
  </g>
  <text
    x="400"
    y="700"
    text-anchor="middle"
    font-family="Inter, system-ui, sans-serif"
    font-size="28"
    font-weight="500"
    letter-spacing="4"
    fill="#ED7396"
  >ADRIANA'S STORE</text>
</svg>
